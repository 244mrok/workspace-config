name: HeroAcademia

options:
  bundleIdPrefix: com.heroacademia
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk
    exactVersion: "11.6.0"

targets:
  HeroAcademia:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HeroAcademia
        excludes:
          - "Resources/**"
      - path: HeroAcademia/Resources/Assets.xcassets
        buildPhase: resources
      - path: HeroAcademia/Resources/GoogleService-Info.plist
        buildPhase: resources
      - path: HeroAcademia/Resources/Localizable.strings
        buildPhase: resources
    entitlements:
      path: HeroAcademia/HeroAcademia.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heroacademia.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSHealthShareUsageDescription: "体重・体脂肪率などの健康データを読み取るために使用します"
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "手動入力した体重・体脂肪率をHealthKitに保存するために使用します"
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseAuth
      - package: firebase-ios-sdk
        product: FirebaseFirestore
      - sdk: HealthKit.framework

  HeroAcademiaWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - HeroAcademiaWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heroacademia.app.watchkitapp
        GENERATE_INFOPLIST_FILE: YES
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        INFOPLIST_KEY_WKApplication_InterfaceOrientation: "[]"
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.heroacademia.app

  HeroAcademiaTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - HeroAcademiaTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heroacademia.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: HeroAcademia

  HeroAcademiaUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - HeroAcademiaUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heroacademia.uitests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: HeroAcademia

schemes:
  HeroAcademia:
    build:
      targets:
        HeroAcademia: all
        HeroAcademiaTests: [test]
        HeroAcademiaUITests: [test]
    test:
      targets:
        - HeroAcademiaTests
        - HeroAcademiaUITests
